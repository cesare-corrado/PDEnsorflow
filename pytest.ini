[pytest]
minversion = 7.0

# Tier-1 (fast, CPU-only) tests run on every push / pull request and are the
# default collection. The heavier Tier-2 suite under Tests/CICD/nightly is
# selected explicitly by the scheduled (self-hosted GPU) job:
#     pytest PDEnsorflow/Tests/CICD/nightly
testpaths = PDEnsorflow/Tests/CICD/unit

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    nightly: heavier / reduced-config solver regressions run by the nightly job
    gpu: test requires a physical GPU
