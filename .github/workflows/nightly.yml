name: Nightly GPU

# Tier-2 continuous integration: the heavier / GPU-only regressions that the fast
# CPU Tier-1 (ci.yml) deliberately skips. It runs on a SELF-HOSTED GPU runner, on
# a schedule (and on demand from the Actions tab), and never on push. The job
# re-runs the whole Tier-1 unit suite ON THE GPU -- so the device-gated
# csr_axpby native-path cases that skip on the CPU build actually execute -- plus
# the nightly regressions under Tests/CICD/nightly (e.g. the 2D mMS
# conduction-velocity regression).
#
# RUNNER PREREQUISITES (maintainer, one-time set-up):
#   * A self-hosted runner registered with the labels: [self-hosted, gpu].
#   * A conda env named by CI_CONDA_ENV (below), provisioned with:
#       - a GPU (CUDA) TensorFlow build -- NOT tensorflow-cpu;
#       - the editable package:  pip install --no-deps -e .
#       - an activate.d shim (e.g. etc/conda/activate.d/zzz_cuda_ld.sh) that
#         exports LD_LIBRARY_PATH to the nvidia-*-cu12 lib dirs + $CONDA_PREFIX/lib
#         AT ACTIVATION TIME. This is required: it makes the GPU visible to
#         TensorFlow and stops gpuSolve/__init__.py from re-exec'ing the
#         interpreter mid-pytest.
#   * The runner's shell profile must initialise conda (this workflow uses a
#     login shell so `conda` / `conda run` are on PATH).
#
# Security: a self-hosted runner executes arbitrary workflow code, so keep it on
# trusted refs only. This workflow is intentionally NOT triggered by pull requests
# (schedule + manual dispatch only), so fork PRs cannot run on the GPU box.

on:
  schedule:
    - cron: '0 3 * * 6,0'   # 03:00 UTC on Sat & Sun (the GPU box is free at weekends)
  workflow_dispatch:        # allow manual runs from the Actions tab

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # conda env to activate on the self-hosted GPU runner (see prerequisites above)
  CI_CONDA_ENV: pdensorflow-gpu

defaults:
  run:
    shell: bash -el {0}   # login shell so the runner profile initialises conda

jobs:
  gpu-tests:
    name: Nightly GPU tests (unit + nightly)
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: GPU sanity gate (fail loudly if no GPU is visible)
        # Imports gpuSolve first, then asserts a physical GPU is present, so the
        # suite can never silently fall back to CPU (which would re-skip the
        # device-gated csr_axpby cases). Run as a script, never `python -c`.
        run: conda run -n "$CI_CONDA_ENV" python PDEnsorflow/Tests/CICD/nightly/_gpu_check.py

      - name: Run unit + nightly suite on the GPU
        # Explicit paths override pytest.ini's testpaths (unit only), so this runs
        # Tier-1 on the GPU AND the Tier-2 nightly regressions in one session.
        run: conda run -n "$CI_CONDA_ENV" python -m pytest PDEnsorflow/Tests/CICD/unit PDEnsorflow/Tests/CICD/nightly -v
